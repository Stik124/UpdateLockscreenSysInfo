### 3) Проверьте `build.yml` (WiX PATH)

У вас сейчас добавляется путь `C:\Program Files (x86)\WiX Toolset v3.11\bin`, а choco ставит WiX v3.14. Лучше синхронизировать:

```yaml
name: Build MSI

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🧰 Install WiX
        run: choco install wixtoolset -y

      - name: ➕ Add WiX to PATH
        run: echo "C:\Program Files (x86)\WiX Toolset v3.14\bin" >> $env:GITHUB_PATH

      - name: 🏗 Build MSI
        run: powershell -ExecutionPolicy Bypass -File build-msi.ps1

      - name: 📦 Create Release + upload MSI
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: UpdateLockScreen v${{ github.run_number }}
          files: Dist/*.msi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
```

