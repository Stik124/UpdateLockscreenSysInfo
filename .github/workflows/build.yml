## ✅ Анализ ошибки CI (что именно сломалось)

Из логов видно две проблемы:

1. **Ошибка компиляции WiX**:  
   `error CNDL0104 : Not a valid source file; detail: Name cannot begin with the '*' character... Line 42, position 254.`  
   Это значит, что в `Product.build.wxs` на строке 42 (где задаётся `Product Id="*"`) WiX не принимает такой формат. Причина — скорее всего в том, как вы подставляете версию или как формируется `Product.build.wxs` (или сам `Product.wxs` содержит синтаксическую ошибку).

2. **Release не находит MSI**:  
   `Pattern 'Dist/*.msi' does not match any files.` — потому что сборка MSI не завершилась успешно, и папка `Dist` либо не создалась, либо там нет `.msi`.

---

## 🔧 Исправления

### 1) Исправьте `Product.wxs` (уберите проблемный `Id="*"`)

WiX 3.x корректно работает с GUID для `Product Id`. Используйте либо фиксированный GUID (не меняется при обновлениях), либо автогенерацию через `Id="*"` — но **WiX 3.x иногда ругается на `Id="*"` в определённых контекстах/кодировках**. Надёжнее: задайте фиксированный GUID и не меняйте его.

Вот **исправленный `Product.wxs`** (ваш первый вариант, с безопасным `Product Id`):

```xml
<?xml version="1.0" encoding="UTF-8"?>
<Wix xmlns="http://schemas.microsoft.com/wix/2006/wi">

    <Product Id="A7D8F4E2-1C83-4A89-B6C5-9E3F2A1B8C7D"
             Name="UpdateLockScreen"
             Language="1033"
             Version="VERSION_PLACEHOLDER"
             Manufacturer="Avdeev D.V."
             UpgradeCode="A7D8F4E2-1C83-4A89-B6C5-9E3F2A1B8C7D"
             Codepage="1251">

        <Package InstallerVersion="200" Compressed="yes" InstallScope="perMachine" Platform="x64" />

        <!-- ==================== ОБНОВЛЕНИЕ ==================== -->
        <MajorUpgrade
            DowngradeErrorMessage="Новая версия UpdateLockScreen уже установлена. Установка старой версии невозможна."
            Schedule="afterInstallInitialize" />

        <MediaTemplate EmbedCab="yes" />

        <Feature Id="ProductFeature" Title="UpdateLockScreen" Level="1">
            <ComponentRef Id="MainFiles" />
        </Feature>

        <Directory Id="TARGETDIR" Name="SourceDir">
            <Directory Id="ProgramFiles64Folder">
                <Directory Id="INSTALLFOLDER" Name="UpdateLockScreen">
                    <Component Id="MainFiles" Guid="D4E5F6A7-B8C9-4D3E-8F1A-2B3C4D5E6F79" Win64="yes">
                        <File Source="files\install-script.ps1" />
                        <File Source="files\uninstall-script.ps1" />
                        <File Source="files\background.jpg" />
                    </Component>
                </Directory>
            </Directory>
        </Directory>

        <!-- ==================== CUSTOM ACTIONS ==================== -->

        <!-- Остановка процессов перед обновлением/удалением -->
        <CustomAction Id="StopProcesses"
            Directory="INSTALLFOLDER"
            ExeCommand='powershell.exe -NoProfile -ExecutionPolicy Bypass -Command "Stop-ScheduledTask -TaskName UpdateLockScreen -ErrorAction SilentlyContinue; Get-Process wscript,powershell -ErrorAction SilentlyContinue | Where-Object {$_.Path -like ''*UpdateLockScreen*''} | Stop-Process -Force -ErrorAction SilentlyContinue; Start-Sleep -Seconds 2"'
            Execute="immediate"
            Return="ignore"
            Impersonate="no" />

        <CustomAction Id="RunInstallScript"
            Directory="INSTALLFOLDER"
            ExeCommand='powershell.exe -NoProfile -ExecutionPolicy Bypass -WindowStyle Hidden -File "install-script.ps1"'
            Execute="deferred"
            Return="check"
            Impersonate="no" />

        <CustomAction Id="RunUninstallScript"
            Directory="INSTALLFOLDER"
            ExeCommand='powershell.exe -NoProfile -ExecutionPolicy Bypass -WindowStyle Hidden -File "uninstall-script.ps1"'
            Execute="deferred"
            Return="ignore"
            Impersonate="no" />

        <InstallExecuteSequence>
            <!-- Останавливаем процессы ПЕРЕД началом установки/обновления -->
            <Custom Action="StopProcesses" Before="InstallValidate">
                Installed OR UPGRADINGPRODUCTCODE
            </Custom>

            <!-- При установке и обновлении -->
            <Custom Action="RunInstallScript" After="InstallFiles">
                NOT Installed OR UPGRADINGPRODUCTCODE
            </Custom>

            <!-- При удалении -->
            <Custom Action="RunUninstallScript" Before="RemoveFiles">
                REMOVE="ALL"
            </Custom>
        </InstallExecuteSequence>

    </Product>

</Wix>
```

> Важно: `UpgradeCode` оставляем как есть (он отвечает за обновления). `Product Id` теперь фиксированный — это нормально для WiX 3.x.

---

### 2) Улучшите `build-msi.ps1` (добавьте проверки и вывод ошибок)

Это поможет видеть, где именно падает сборка:

```powershell
param(
    [string]$Version = "1.0.0." + $env:GITHUB_RUN_NUMBER,
    [string]$OutputPath = ".\Dist"
)

Write-Host "Version: $Version"
Write-Host "Сборка MSI..." -ForegroundColor Green

# Создаем выходную директорию
if (!(Test-Path $OutputPath)) {
    New-Item -ItemType Directory -Path $OutputPath -Force | Out-Null
}

$CANDLE = "candle.exe"
$LIGHT = "light.exe"

Write-Host "Cleaning..." -ForegroundColor Yellow
Remove-Item "*.wixobj" -ErrorAction SilentlyContinue
Remove-Item "*.wixpdb" -ErrorAction SilentlyContinue

# Проверяем файлы
$required = @("files\install-script.ps1", "files\uninstall-script.ps1", "files\background.jpg")
foreach ($f in $required) {
    if (!(Test-Path $f)) {
        Write-Error "Не найден файл: $f"
        exit 1
    }
}
Write-Host "Все файлы найдены" -ForegroundColor Green

# Подставляем версию в Product.wxs
(Get-Content Product.wxs) -replace 'VERSION_PLACEHOLDER', $Version | Set-Content Product.build.wxs

Write-Host "Компиляция..." -ForegroundColor Yellow
& $CANDLE Product.build.wxs
if ($LASTEXITCODE -ne 0) {
    Write-Error "Ошибка компиляции candle.exe. Проверьте Product.build.wxs"
    exit 1
}
Write-Host "Компиляция успешна" -ForegroundColor Green

Write-Host "Линковка..." -ForegroundColor Yellow
& $LIGHT -ext WixUtilExtension -out "$OutputPath\UpdateLockScreen-$Version.msi" "Product.build.wixobj"
if ($LASTEXITCODE -ne 0) {
    Write-Error "Ошибка линковки light.exe. Проверьте наличие WixUtilExtension"
    exit 1
}
Write-Host "MSI успешно собран: $OutputPath\UpdateLockScreen-$Version.msi" -ForegroundColor Green

# Очистка
Remove-Item "*.wixobj" -ErrorAction SilentlyContinue
Remove-Item "*.wixpdb" -ErrorAction SilentlyContinue

# Информация о файле
if (Test-Path "$OutputPath\UpdateLockScreen-$Version.msi") {
    $msiFile = Get-Item "$OutputPath\UpdateLockScreen-$Version.msi"
    Write-Host "Размер: $([math]::Round($msiFile.Length/1KB, 2)) KB" -ForegroundColor Yellow
}
```

